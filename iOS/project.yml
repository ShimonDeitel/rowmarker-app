name: Rowmarker
options:
  bundleIdPrefix: com.shimondeitel.rowmarker
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Rowmarker:
    type: application
    platform: iOS
    sources:
      - path: Rowmarker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rowmarker
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Rowmarker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RowmarkerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RowmarkerTests
      - path: Rowmarker.storekit
    dependencies:
      - target: Rowmarker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rowmarker.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RowmarkerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RowmarkerUITests
    dependencies:
      - target: Rowmarker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rowmarker.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Rowmarker:
    build:
      targets:
        Rowmarker: all
        RowmarkerTests: [test]
        RowmarkerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Rowmarker.storekit
    test:
      config: Debug
      storeKitConfiguration: Rowmarker.storekit
      targets:
        - RowmarkerTests
        - RowmarkerUITests
    archive:
      config: Release
